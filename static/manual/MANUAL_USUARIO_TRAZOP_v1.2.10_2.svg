<?xml version="1.0" encoding="UTF-8" standalone="no"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"><svg width="100%" height="100%" viewBox="0 0 750 1625" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-miterlimit:10;"><g><path d="M52.083,71.26l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#0f6a4f;stroke-width:2.08px;"/><g transform="matrix(0.991817,0,0,1,-0.084275,0)"><g transform="matrix(11.094214,0,0,11.094214,203.648436,60.160224)"></g><g transform="matrix(11.094214,0,0,11.094214,207.342896,60.160224)"></g><text x="52.598px" y="60.16px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:11.094px;fill:#0f6a4f;">Tr<tspan x="63.692px " y="60.16px ">a</tspan>zOp | Manual del usuario ﬁnal</text></g></g><g><rect x="52.083" y="829.039" width="55.357" height="263.551" style="fill:#0f6a4f;"/><rect x="107.44" y="829.039" width="590.476" height="43.925" style="fill:#fff;"/><rect x="107.44" y="872.964" width="590.476" height="43.925" style="fill:#e8f4ef;"/><rect x="107.44" y="916.89" width="590.476" height="43.925" style="fill:#fff;"/><rect x="107.44" y="960.815" width="590.476" height="43.925" style="fill:#e8f4ef;"/><rect x="107.44" y="1004.74" width="590.476" height="43.925" style="fill:#fff;"/><rect x="107.44" y="1048.665" width="590.476" height="43.925" style="fill:#e8f4ef;"/><text x="57.25px" y="245.765px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:24.799px;fill:#0f6a4f;">Introducción</text><text x="57.25px" y="277.742px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">Tr<tspan x="70.185px " y="277.742px ">a</tspan>zOp facilita el registro, seguimiento y control de las actividades realizadas durante el proceso</text><text x="57.25px" y="297.32px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">productivo. Cada operario puede administrar sus tareas desde un computador o dispositivo móvil,</text><text x="57.25px" y="316.898px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">dejando evidencia de tiempos, cantidades y controles.</text><g transform="matrix(13.704617,0,0,13.704617,621.776007,345.612727)"></g><g transform="matrix(13.704617,0,0,13.704617,625.583588,345.612727)"></g><text x="57.25px" y="345.613px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">La aplicación acompaña al usuario desde el inicio de una actividad hasta su cierre. A<tspan x="573.014px " y="345.613px ">n</tspan>tes de ﬁnalizar,</text><g transform="matrix(13.704617,0,0,13.704617,225.600169,365.190751)"></g><g transform="matrix(13.704617,0,0,13.704617,229.407751,365.190751)"></g><g transform="matrix(13.704617,0,0,13.704617,378.713124,365.190751)"></g><g transform="matrix(13.704617,0,0,13.704617,382.520705,365.190751)"></g><text x="57.25px" y="365.191px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">presenta el checklist especíﬁco del proceso para veriﬁcar los controles de calidad, producción, limpieza</text><text x="57.25px" y="384.769px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">o mantenimiento aplicables.</text><g transform="matrix(24.798831,0,0,24.798831,355.600705,499.893314)"></g><g transform="matrix(24.798831,0,0,24.798831,363.858909,499.893314)"></g><text x="60.715px" y="499.893px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:24.799px;fill:#0f6a4f;">¿Cómo ayuda al usuario ﬁnal?</text><text x="69.851px" y="531.871px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">• Presenta claramente las órdenes y tareas asignadas.</text><g transform="matrix(13.704617,0,0,13.704617,385.465803,556.669585)"></g><g transform="matrix(13.704617,0,0,13.704617,389.273385,556.669585)"></g><text x="69.851px" y="556.67px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">• Registra las horas de inicio, pausa, reanudación y ﬁnalización.</text><text x="69.851px" y="581.468px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">• Descuenta las pausas del tiempo efectivo de trabajo.</text><g transform="matrix(13.704617,0,0,13.704617,235.364116,606.267246)"></g><g transform="matrix(13.704617,0,0,13.704617,239.171697,606.267246)"></g><text x="69.851px" y="606.267px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">• Utiliza un checklist especíﬁco para cada proceso.</text><g transform="matrix(13.704617,0,0,13.704617,112.731888,631.066077)"></g><g transform="matrix(13.704617,0,0,13.704617,116.539469,631.066077)"></g><text x="69.851px" y="631.066px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">• Evita ﬁnalizar actividades que no cumplan sus controles.</text><text x="69.851px" y="655.865px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">• Calcula automáticamente valores como la cantidad de etiquetas en Flexo.</text><text x="69.851px" y="680.664px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.705px;fill:#27332f;">• Conserva un historial organizado para consulta y trazabilidad.</text><text x="75.769px" y="857.073px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:16.894px;fill:#fff;">1</text><text x="119.017px" y="857.024px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.894px;fill:#27332f;">Ingresar</text><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="82.274px" y="901.685px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:16.894px;fill:#fff;">2</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="125.842px" y="901.685px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.894px;fill:#27332f;">Seleccionar OP <tspan x="247.913px " y="901.685px ">y</tspan> proceso</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="82.274px" y="945.61px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:16.894px;fill:#fff;">3</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="125.842px" y="945.61px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.894px;fill:#27332f;">Iniciar la tarea</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="82.274px" y="989.535px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:16.894px;fill:#fff;">4</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="125.842px" y="989.535px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.894px;fill:#27332f;">Completar el checklist</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="82.274px" y="1033.46px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:16.894px;fill:#fff;">5</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="125.842px" y="1033.46px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.894px;fill:#27332f;">Finalizar</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="82.274px" y="1077.386px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:16.894px;fill:#fff;">6</text></g><g transform="matrix(0.963281,0,0,1,-4.016157,0)"><text x="125.842px" y="1077.386px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.894px;fill:#27332f;">Consultar historial</text></g><path d="M106.505,829.039l591.411,0" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M52.083,1092.591l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M697.917,1095.322l0,-266.283" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M52.083,872.964l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M52.083,916.89l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M52.083,960.815l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M52.083,1004.74l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M52.083,1048.665l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M107.44,1092.591l0,-263.551" style="fill:none;fill-rule:nonzero;stroke:#b8d8ca;stroke-width:1.04px;stroke-linecap:round;stroke-linejoin:round;"/></g><text x="633px" y="1569.409px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.667px;fill:#66736e;">Página 2</text></svg>