<?xml version="1.0" encoding="UTF-8" standalone="no"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"><svg width="100%" height="100%" viewBox="0 0 750 1625" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-miterlimit:10;"><g><path d="M52.083,71.103l645.833,0" style="fill:none;fill-rule:nonzero;stroke:#0f6a4f;stroke-width:2.08px;"/><g transform="matrix(11.003427,0,0,11.003427,201.897501,60.094129)"></g><g transform="matrix(11.003427,0,0,11.003427,205.561728,60.094129)"></g><text x="52.083px" y="60.094px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:11.003px;fill:#0f6a4f;">Tr<tspan x="63.087px " y="60.094px ">a</tspan>zOp | Manual del usuario ﬁnal</text></g><g><g><rect x="96.117" y="463.372" width="557.765" height="82.849" style="fill:#e8f4ef;"/><g transform="matrix(12.945209,0,0,12.945209,202.427415,499.618252)"></g><g transform="matrix(12.945209,0,0,12.945209,206.738271,499.618252)"></g><text x="116.83px" y="499.618px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:12.945px;fill:#0f6a4f;">Tr<tspan x="129.775px " y="499.618px ">a</tspan>zOp simpliﬁca el registro operativo, <tspan x="359.296px " y="499.618px ">r</tspan>educe la duplicación de datos <tspan x="551.403px " y="499.618px ">y</tspan> conserva la</text><text x="246.591px" y="517.742px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:12.945px;fill:#0f6a4f;">trazabilidad de cada actividad productiva.</text><path d="M96.117,463.372l557.765,0" style="fill:none;fill-rule:nonzero;stroke:#0f6a4f;stroke-width:2.08px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M96.117,546.221l557.765,0" style="fill:none;fill-rule:nonzero;stroke:#0f6a4f;stroke-width:2.08px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M96.117,546.221l0,-82.849" style="fill:none;fill-rule:nonzero;stroke:#0f6a4f;stroke-width:2.08px;stroke-linecap:round;stroke-linejoin:round;"/><path d="M653.883,546.221l0,-82.849" style="fill:none;fill-rule:nonzero;stroke:#0f6a4f;stroke-width:2.08px;stroke-linecap:round;stroke-linejoin:round;"/></g><text x="82.557px" y="155.975px" style="font-family:'Arial-BoldMT', 'Arial', sans-serif;font-weight:700;font-size:24.596px;fill:#0f6a4f;">Recomendaciones de uso</text><g><text x="81.685px" y="238.781px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.592px;fill:#27332f;">• Utilice siempre su usuario personal; no comparta credenciales.</text><g transform="matrix(13.592469,0,0,13.592469,115.154842,263.376985)"></g><g transform="matrix(13.592469,0,0,13.592469,118.931265,263.376985)"></g><text x="81.685px" y="263.377px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.592px;fill:#27332f;">• Conﬁrme la OP <tspan x="186.907px " y="263.377px ">y</tspan> el proceso antes de iniciar una tarea.</text><text x="81.685px" y="287.973px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.592px;fill:#27332f;">• Use Pausa cuando la actividad se interrumpa y Reanudar al continuar.</text><text x="81.685px" y="312.569px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.592px;fill:#27332f;">• Diligencie cada checklist con información real y completa.</text><text x="81.685px" y="337.165px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.592px;fill:#27332f;">• No cierre ni actualice la página mientras se está guardando información.</text><g transform="matrix(13.592469,0,0,13.592469,259.455356,361.76057)"></g><g transform="matrix(13.592469,0,0,13.592469,263.231779,361.76057)"></g><text x="81.685px" y="361.761px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.592px;fill:#27332f;">• Revise los mensajes de conﬁrmación antes de continuar.</text><text x="81.685px" y="386.356px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.592px;fill:#27332f;">• Cierre sesión al terminar el turno o cuando deje el dispositivo sin supervisión.</text></g></g><g transform="matrix(16.666667,0,0,16.666667,698.795573,1569.40918)"></g><text x="623.73px" y="1569.409px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:16.667px;fill:#66736e;">Página 12</text></svg>