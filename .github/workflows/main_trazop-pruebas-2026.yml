name: Validate Python app for PythonAnywhere

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python files
        run: |
          source .venv/bin/activate
          python -m py_compile app.py wsgi.py
          python -m compileall core admin usuario

# Este workflow solo valida la aplicación para despliegue en PythonAnywhere.
# El despliegue real debe hacerse desde la consola de PythonAnywhere o
# mediante un push manual al entorno que tengas configurado.
